services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: phongtro-db
    restart: unless-stopped
    environment:
      ACCEPT_EULA: Y
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  api:
    build:
      context: ./server
    container_name: phongtro-api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: sqlserver://sa:${MSSQL_SA_PASSWORD}@db:1433;database=${MSSQL_DATABASE};trustServerCertificate=true;encrypt=false
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${APP_ORIGIN}
      FRONTEND_URL: ${APP_ORIGIN}
      UPLOAD_DIRECTORY: ./uploads
    volumes:
      - uploads_data:/app/uploads

  chat:
    build:
      context: ./server
    container_name: phongtro-chat
    restart: unless-stopped
    depends_on:
      - api
    command: ["npm", "run", "chat"]
    environment:
      CHAT_PORT: 3001
      CHAT_AI_ENABLED: ${CHAT_AI_ENABLED:-true}
      CHAT_AI_NAME: ${CHAT_AI_NAME:-Tro ly AI}
    volumes:
      - chat_data:/app/.data

  web:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: /api
        VITE_WS_URL: /ws
    container_name: phongtro-web
    restart: unless-stopped
    depends_on:
      - api
      - chat
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  sqlserver_data:
  uploads_data:
  chat_data: